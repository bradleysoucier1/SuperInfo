<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperInfo - AI Wikipedia</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for rendering Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom typography styles to mimic Wikipedia */
        .markdown-body h1 { font-size: 2.25rem; font-weight: 700; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; margin-top: 2rem; margin-bottom: 1rem; font-family: Georgia, serif; }
        .markdown-body h2 { font-size: 1.75rem; font-weight: 600; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.25rem; margin-top: 1.75rem; margin-bottom: 1rem; font-family: Georgia, serif; }
        .markdown-body h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body p { margin-bottom: 1rem; line-height: 1.7; }
        .markdown-body ul { list-style-type: disc; padding-left: 2rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 2rem; margin-bottom: 1rem; }
        .markdown-body strong { font-weight: 600; color: #111827; }
        .markdown-body a { color: #2563eb; text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body blockquote { border-left: 4px solid #e5e7eb; padding-left: 1rem; color: #4b5563; font-style: italic; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Smooth transitions */
        #search-container { transition: all 0.5s ease-in-out; }
        .centered-search { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .top-search { min-height: auto; padding-top: 2rem; padding-bottom: 2rem; }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans antialiased min-h-screen">

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Search Section -->
        <div id="search-container" class="centered-search">
            <div class="text-center mb-8" id="logo-container">
                <i data-lucide="globe" class="w-16 h-16 mx-auto text-blue-600 mb-4"></i>
                <h1 class="text-4xl md:text-5xl font-bold text-gray-900 tracking-tight font-serif">SuperInfo Wiki</h1>
                <p class="mt-3 text-lg text-gray-500">The encyclopedic knowledge base generated by AI.</p>
            </div>
            
            <form id="search-form" class="max-w-2xl mx-auto w-full relative">
                <div class="relative flex items-center">
                    <i data-lucide="search" class="absolute left-4 text-gray-400 w-5 h-5"></i>
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Search for any topic, person, or concept..." 
                        class="w-full pl-12 pr-4 py-4 text-lg border border-gray-300 rounded-full shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
                        required
                    >
                    <button type="submit" class="absolute right-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-medium transition-colors">
                        Read
                    </button>
                </div>
            </form>
        </div>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden bg-red-50 border-l-4 border-red-500 p-4 my-6 rounded-r-md">
            <div class="flex">
                <div class="flex-shrink-0">
                    <i data-lucide="alert-circle" class="h-5 w-5 text-red-400"></i>
                </div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800">Error</h3>
                    <div class="mt-2 text-sm text-red-700">
                        <p id="error-message">Something went wrong.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden flex-col items-center justify-center py-20">
            <div class="loader mb-6"></div>
            <h2 id="loading-title" class="text-2xl font-semibold text-gray-700 font-serif">Searching...</h2>
            <p id="loading-subtitle" class="text-gray-500 mt-2">Checking knowledge base.</p>
        </div>

        <!-- Article Display Area -->
        <div id="article-container" class="hidden pb-20 opacity-0 transition-opacity duration-500">
            
            <div class="flex items-center space-x-2 mb-6" id="badge-container">
                <!-- Badges injected here -->
            </div>
            
            <h1 id="article-title" class="text-4xl md:text-5xl font-bold font-serif text-gray-900 mb-8 border-b pb-4"></h1>
            
            <div id="article-content" class="markdown-body text-lg"></div>
            
            <div class="mt-12 pt-6 border-t border-gray-200 text-sm text-gray-500 flex justify-between items-center">
                <p>Powered by Vertex AI in Firebase</p>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="text-blue-600 hover:underline flex items-center">
                    Back to top <i data-lucide="arrow-up" class="w-4 h-4 ml-1"></i>
                </button>
            </div>
        </div>

    </div>

    <!-- Application Logic -->
    <script type="module">
        // Import standard Firebase app & Firestore
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // Import Firebase Vertex AI SDK
        import { getVertexAI, getGenerativeModel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-vertexai.js";

        // Your provided Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB7vXm-KjKfnfMi-JgttejMV_uXoZZTWnQ",
            authDomain: "superinfo-f31f5.firebaseapp.com",
            projectId: "superinfo-f31f5",
            storageBucket: "superinfo-f31f5.firebasestorage.app",
            messagingSenderId: "829592714928",
            appId: "1:829592714928:web:3c1c6dc020be3568eac575",
            measurementId: "G-3842263MML"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        
        // Initialize Firestore
        const db = getFirestore(app);

        // Initialize the Vertex AI service and the Generative Model
        const vertexAI = getVertexAI(app);
        
        // Using the model you specifically requested
        const model = getGenerativeModel(vertexAI, { model: "gemini-3-flash-preview" }); 
        
        // Initialize Lucide icons
        lucide.createIcons();

        // DOM Elements
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const searchContainer = document.getElementById('search-container');
        const loadingState = document.getElementById('loading-state');
        const loadingTitle = document.getElementById('loading-title');
        const loadingSubtitle = document.getElementById('loading-subtitle');
        const articleContainer = document.getElementById('article-container');
        const articleTitle = document.getElementById('article-title');
        const articleContent = document.getElementById('article-content');
        const badgeContainer = document.getElementById('badge-container');
        const logoContainer = document.getElementById('logo-container');
        const errorBanner = document.getElementById('error-banner');
        const errorMessage = document.getElementById('error-message');

        // Main Search Handler
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (!query) return;

            // Reset UI
            errorBanner.classList.add('hidden');
            searchContainer.classList.remove('centered-search');
            searchContainer.classList.add('top-search');
            logoContainer.classList.add('hidden');
            articleContainer.classList.add('hidden');
            articleContainer.classList.remove('opacity-100');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            
            // Create a URL-friendly slug (e.g. "Eiffel Tower" -> "eiffel-tower")
            const slug = query.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

            try {
                // STEP 1: Check Database First
                updateLoadingText("Searching Knowledge Base...", "Checking database for existing articles.");
                
                let existingData = null;
                try {
                    const docRef = doc(db, "articles", slug);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        existingData = docSnap.data();
                    }
                } catch (dbError) {
                    // If Firestore fails (e.g., security rules), log it but proceed to generate a new article
                    console.warn("Firestore read bypassed:", dbError.message);
                }

                // STEP 2: Render existing OR generate new via Vertex AI
                if (existingData && existingData.content) {
                    renderArticle(existingData.title || query, existingData.content, "cache");
                } else {
                    await generateNewArticle(query, slug);
                }

            } catch (error) {
                console.error("Application error:", error);
                showError(`Failed to fetch article: ${error.message}`);
            }
        });

        // Function to generate new article using Vertex AI
        async function generateNewArticle(query, slug) {
            updateLoadingText("Generating AI Article...", `Writing a comprehensive Wikipedia page for "${query}". This may take a few seconds.`);
            
            const prompt = `You are an expert encyclopedic AI. Write a highly detailed, neutral, and comprehensive Wikipedia-style article about "${query}". 
            Format the response entirely in Markdown. 
            Do NOT include the main Title/H1 at the very top (I will provide that).
            Include standard Wikipedia sections where applicable, such as:
            - An introductory summary paragraph
            - History / Origins
            - Core Mechanisms / Key Concepts
            - Impact / Applications
            - See Also
            Ensure the tone is objective and informative.`;

            let markdownContent = "";

            try {
                // Generate content using Firebase Vertex AI
                const result = await model.generateContent(prompt);
                markdownContent = result.response.text();
                
                if (!markdownContent) throw new Error("Received empty response from AI model.");
            } catch (aiError) {
                throw new Error("Vertex AI Generation failed: " + aiError.message);
            }

            // Save the newly generated content to Firestore
            try {
                const docRef = doc(db, "articles", slug);
                await setDoc(docRef, {
                    title: query,
                    content: markdownContent,
                    createdAt: serverTimestamp()
                });
            } catch (dbError) {
                console.warn("Firestore write bypassed (article generated but not saved to cache):", dbError.message);
            }

            // Render the AI result
            renderArticle(query, markdownContent, "ai");
        }

        // Function to render the article and update UI
        function renderArticle(title, markdown, source) {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            
            articleTitle.innerText = title;
            articleContent.innerHTML = marked.parse(markdown);
            
            // Set Badges to show where the data came from
            badgeContainer.innerHTML = '';
            if (source === 'cache') {
                badgeContainer.innerHTML = `
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                        <i data-lucide="database" class="w-3 h-3 mr-1"></i> Loaded from Database
                    </span>
                `;
            } else {
                badgeContainer.innerHTML = `
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800">
                        <i data-lucide="sparkles" class="w-3 h-3 mr-1"></i> Newly Generated by AI
                    </span>
                `;
            }
            lucide.createIcons();

            articleContainer.classList.remove('hidden');
            // Trigger reflow for transition
            void articleContainer.offsetWidth; 
            articleContainer.classList.add('opacity-100');
        }

        function updateLoadingText(title, subtitle) {
            loadingTitle.innerText = title;
            loadingSubtitle.innerText = subtitle;
        }

        function showError(msg) {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            errorMessage.innerText = msg;
            errorBanner.classList.remove('hidden');
        }
    </script>
</body>
</html>
