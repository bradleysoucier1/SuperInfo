<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperInfo - AI Wikipedia</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js for rendering Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom typography styles to mimic Wikipedia */
        .markdown-body h1 { font-size: 2.25rem; font-weight: 700; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; margin-top: 2rem; margin-bottom: 1rem; font-family: Georgia, serif; }
        .markdown-body h2 { font-size: 1.75rem; font-weight: 600; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.25rem; margin-top: 1.75rem; margin-bottom: 1rem; font-family: Georgia, serif; }
        .markdown-body h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body p { margin-bottom: 1rem; line-height: 1.7; }
        .markdown-body ul { list-style-type: disc; padding-left: 2rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 2rem; margin-bottom: 1rem; }
        .markdown-body strong { font-weight: 600; color: #111827; }
        .markdown-body a { color: #2563eb; text-decoration: none; cursor: pointer; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body blockquote { border-left: 4px solid #e5e7eb; padding-left: 1rem; color: #4b5563; font-style: italic; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #search-container { transition: all 0.5s ease-in-out; }
        .centered-search { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .top-search { min-height: auto; padding-top: 2rem; padding-bottom: 2rem; }

        /* Kebab Menu styles */
        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            z-index: 40;
            min-width: 200px;
        }
        .menu-dropdown.show { display: block; }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans antialiased min-h-screen">

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Search Section -->
        <div id="search-container" class="centered-search">
            <div class="text-center mb-8" id="logo-container">
                <i data-lucide="globe" class="w-16 h-16 mx-auto text-blue-600 mb-4"></i>
                <h1 class="text-4xl md:text-5xl font-bold text-gray-900 tracking-tight font-serif">SuperInfo Wiki</h1>
                <p class="mt-3 text-lg text-gray-500">The encyclopedic knowledge base generated by AI.</p>
            </div>
            
            <form id="search-form" class="max-w-2xl mx-auto w-full relative">
                <div class="relative flex items-center">
                    <i data-lucide="search" class="absolute left-4 text-gray-400 w-5 h-5"></i>
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Search for any topic..." 
                        class="w-full pl-12 pr-4 py-4 text-lg border border-gray-300 rounded-full shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
                        required
                    >
                    <button type="submit" class="absolute right-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-medium transition-colors">
                        Read
                    </button>
                </div>
            </form>
        </div>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden bg-red-50 border-l-4 border-red-500 p-4 my-6 rounded-r-md">
            <div class="flex">
                <div class="flex-shrink-0"><i data-lucide="alert-circle" class="h-5 w-5 text-red-400"></i></div>
                <div class="ml-3">
                    <h3 class="text-sm font-medium text-red-800">Error</h3>
                    <div class="mt-2 text-sm text-red-700"><p id="error-message"></p></div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden flex-col items-center justify-center py-20">
            <div class="loader mb-6"></div>
            <h2 id="loading-title" class="text-2xl font-semibold text-gray-700 font-serif">Searching...</h2>
            <p id="loading-subtitle" class="text-gray-500 mt-2 text-center max-w-md"></p>
        </div>

        <!-- Article Display Area -->
        <div id="article-container" class="hidden pb-20 opacity-0 transition-opacity duration-500">
            
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-wrap gap-2" id="badge-container"></div>
                
                <!-- Kebab Menu -->
                <div class="relative">
                    <button id="menu-button" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                        <i data-lucide="more-vertical" class="w-6 h-6 text-gray-600"></i>
                    </button>
                    <div id="kebab-menu" class="menu-dropdown bg-white border border-gray-200 shadow-xl rounded-lg py-2 mt-1">
                        <button id="details-btn" class="w-full text-left px-4 py-2 hover:bg-gray-50 flex items-center text-sm font-medium text-gray-700">
                            <i data-lucide="info" class="w-4 h-4 mr-2"></i> Details
                        </button>
                        <button id="update-btn" class="w-full text-left px-4 py-2 hover:bg-gray-50 flex items-center text-sm font-medium text-gray-700">
                            <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> Request article update
                        </button>
                        <button id="share-btn" class="w-full text-left px-4 py-2 hover:bg-gray-50 flex items-center text-sm text-gray-700">
                            <i data-lucide="share-2" class="w-4 h-4 mr-2"></i> Copy link
                        </button>
                    </div>
                </div>
            </div>
            
            <h1 id="article-title" class="text-4xl md:text-5xl font-bold font-serif text-gray-900 mb-8 border-b pb-4"></h1>
            
            <div id="article-content" class="markdown-body text-lg"></div>
            
            <div class="mt-12 pt-6 border-t border-gray-200 text-sm text-gray-500 flex justify-between items-center">
                <p id="footer-text">SuperInfo Knowledge Base</p>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="text-blue-600 hover:underline flex items-center">
                    Back to top <i data-lucide="arrow-up" class="w-4 h-4 ml-1"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modals Overlay -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center p-4 transition-opacity">
        
        <!-- Details Modal -->
        <div id="details-modal" class="hidden bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-4 flex items-center text-gray-900">
                <i data-lucide="info" class="w-5 h-5 mr-2 text-blue-600"></i> Article Details
            </h3>
            <div id="details-content" class="space-y-3 text-sm text-gray-700">
                <!-- Content injected via JS -->
            </div>
            <div class="mt-6 flex justify-end">
                <button class="close-modal bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-lg font-medium transition-colors">Close</button>
            </div>
        </div>

        <!-- Update Request Modal -->
        <div id="update-modal" class="hidden bg-white rounded-xl shadow-2xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-2 flex items-center text-gray-900">
                <i data-lucide="refresh-cw" class="w-5 h-5 mr-2 text-blue-600"></i> Request Update
            </h3>
            <p class="text-sm text-gray-600 mb-4">What specific information is missing, incorrect, or needs to be changed? The AI will use this context to rebuild the article.</p>
            <textarea 
                id="update-context" 
                rows="4" 
                class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none" 
                placeholder="e.g., Include the latest 2024 election results or expand on their early childhood..."
            ></textarea>
            <div class="mt-6 flex justify-end space-x-3">
                <button class="close-modal bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-lg font-medium transition-colors">Cancel</button>
                <button id="submit-update-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">Update Article</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getVertexAI, getGenerativeModel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-vertexai.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7vXm-KjKfnfMi-JgttejMV_uXoZZTWnQ",
            authDomain: "superinfo-f31f5.firebaseapp.com",
            projectId: "superinfo-f31f5",
            storageBucket: "superinfo-f31f5.firebasestorage.app",
            messagingSenderId: "829592714928",
            appId: "1:829592714928:web:3c1c6dc020be3568eac575",
            measurementId: "G-3842263MML"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const vertexAI = getVertexAI(app);
        const model = getGenerativeModel(vertexAI, { 
            model: "gemini-3.1-pro",
            generationConfig: { responseMimeType: "application/json" } 
        }); 
        
        lucide.createIcons();

        // UI State
        let currentArticle = { title: '', slug: '', content: '', tags: [] };

        // DOM Elements
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const searchContainer = document.getElementById('search-container');
        const loadingState = document.getElementById('loading-state');
        const loadingTitle = document.getElementById('loading-title');
        const loadingSubtitle = document.getElementById('loading-subtitle');
        const articleContainer = document.getElementById('article-container');
        const articleTitle = document.getElementById('article-title');
        const articleContent = document.getElementById('article-content');
        const badgeContainer = document.getElementById('badge-container');
        const logoContainer = document.getElementById('logo-container');
        const errorBanner = document.getElementById('error-banner');
        const errorMessage = document.getElementById('error-message');
        const kebabMenu = document.getElementById('kebab-menu');
        const menuBtn = document.getElementById('menu-button');
        
        // Modal Elements
        const modalOverlay = document.getElementById('modal-overlay');
        const detailsModal = document.getElementById('details-modal');
        const updateModal = document.getElementById('update-modal');
        const detailsContent = document.getElementById('details-content');
        const updateContextInput = document.getElementById('update-context');
        const submitUpdateBtn = document.getElementById('submit-update-btn');
        const detailsBtn = document.getElementById('details-btn');

        /**
         * Search and Navigation
         */
        async function performSearch(query, updateHistory = true, forceUpdate = false, updateContext = "") {
            if (!query) return;
            const cleanQuery = query.trim();
            const slug = cleanQuery.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

            if (updateHistory) {
                const newUrl = window.location.pathname + '?article=' + encodeURIComponent(cleanQuery);
                window.history.pushState({ query: cleanQuery }, '', newUrl);
            }
            document.title = `${cleanQuery} - SuperInfo Wiki`;
            searchInput.value = cleanQuery;

            hideUI();
            
            try {
                if (!forceUpdate) {
                    updateLoadingText("Searching Archive...", "Looking for existing documentation.");
                    const docSnap = await getDoc(doc(db, "articles", slug));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        renderArticle(data.title, data.content, "cache", data.tags || []);
                        return;
                    }
                }
                
                await generateOrUpdateArticle(cleanQuery, slug, forceUpdate, updateContext);

            } catch (error) {
                showError(`Navigation Error: ${error.message}`);
            }
        }

        /**
         * Generation Logic (Creation or Update)
         */
        async function generateOrUpdateArticle(query, slug, isUpdate = false, updateContext = "") {
            const task = isUpdate ? "Updating and Verifying" : "Generating";
            let subtitle = `Compiling comprehensive data for "${query}". Checking for the latest information and categorizing.`;
            if (isUpdate && updateContext) {
                subtitle = `Applying requested updates to "${query}"...`;
            }
            updateLoadingText(`${task} Article...`, subtitle);
            
            // System prompt for structured JSON return
            let prompt = `You are a professional encyclopedia generator. Generate a JSON response for the topic: "${query}".
            If this is an update request, specifically look for new developments or missing nuances compared to general knowledge.
            
            JSON structure:
            {
              "title": "Clean version of the title",
              "content": "Full markdown content. Use Wikipedia style. Include internal links as [Topic](?article=Topic).",
              "tags": ["Tag1", "Tag2"]
            }
            
            Tags should include topic type (e.g., "Scientific", "Biography") and status (e.g., "Rapidly Changing", "Stable", "Historically Significant").
            Always include "Newly Generated" or "Recently Updated" in tags.`;

            // Inject the user's specific context if provided
            if (isUpdate && updateContext) {
                prompt += `\n\nCRITICAL UPDATE INSTRUCTIONS: The user explicitly requested the following updates, additions, or focus areas: "${updateContext}". Ensure the newly generated article directly addresses and incorporates this information prominently.`;
            }

            try {
                const result = await model.generateContent(prompt);
                const responseText = result.response.text();
                const data = JSON.parse(responseText);
                
                await setDoc(doc(db, "articles", slug), {
                    ...data,
                    updatedAt: serverTimestamp(),
                    createdAt: isUpdate ? (await getDoc(doc(db, "articles", slug))).data()?.createdAt : serverTimestamp()
                });

                renderArticle(data.title, data.content, isUpdate ? "update" : "ai", data.tags);
            } catch (err) {
                throw new Error("AI Processing failed: " + err.message);
            }
        }

        /**
         * Render Logic
         */
        function renderArticle(title, markdown, source, tags = []) {
            currentArticle = { title, content: markdown, tags };
            
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            
            articleTitle.innerText = title;
            articleContent.innerHTML = marked.parse(markdown);
            
            badgeContainer.innerHTML = '';
            
            // Base Source Badge
            const sourceInfo = {
                cache: { color: 'bg-green-100 text-green-800', icon: 'database', text: 'Verified Record' },
                ai: { color: 'bg-purple-100 text-purple-800', icon: 'sparkles', text: 'AI Generated' },
                update: { color: 'bg-blue-100 text-blue-800', icon: 'refresh-cw', text: 'Recently Updated' }
            }[source];

            addBadge(sourceInfo.text, sourceInfo.color, sourceInfo.icon);

            // AI Generated Tags
            tags.forEach(tag => {
                let color = 'bg-gray-100 text-gray-700';
                if (tag.toLowerCase().includes('rapidly')) color = 'bg-orange-100 text-orange-800';
                if (tag.toLowerCase().includes('scientific')) color = 'bg-cyan-100 text-cyan-800';
                addBadge(tag, color, 'tag');
            });
            
            lucide.createIcons();
            interceptLinks();

            articleContainer.classList.remove('hidden');
            void articleContainer.offsetWidth; 
            articleContainer.classList.add('opacity-100');
        }

        function addBadge(text, color, icon) {
            const span = document.createElement('span');
            span.className = `inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${color}`;
            span.innerHTML = `<i data-lucide="${icon}" class="w-3 h-3 mr-1"></i> ${text}`;
            badgeContainer.appendChild(span);
        }

        function interceptLinks() {
            articleContent.querySelectorAll('a').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.startsWith('?article=')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        performSearch(decodeURIComponent(href.split('=')[1]));
                    });
                }
            });
        }

        function hideUI() {
            errorBanner.classList.add('hidden');
            searchContainer.classList.remove('centered-search');
            searchContainer.classList.add('top-search');
            logoContainer.classList.add('hidden');
            articleContainer.classList.add('hidden');
            articleContainer.classList.remove('opacity-100');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            kebabMenu.classList.remove('show');
            closeModal();
        }

        /**
         * Modals & Kebab Menu Events
         */
        function openModal(modalId) {
            modalOverlay.classList.remove('hidden');
            detailsModal.classList.add('hidden');
            updateModal.classList.add('hidden');
            document.getElementById(modalId).classList.remove('hidden');
            kebabMenu.classList.remove('show');
        }

        function closeModal() {
            modalOverlay.classList.add('hidden');
            updateContextInput.value = '';
        }

        // Close modal when clicking the close buttons or outside the modal box
        document.querySelectorAll('.close-modal').forEach(btn => {
            btn.addEventListener('click', closeModal);
        });
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // Kebab toggle
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            kebabMenu.classList.toggle('show');
        });

        // Global click to close kebab menu
        document.addEventListener('click', () => kebabMenu.classList.remove('show'));

        // Details Logic
        detailsBtn.addEventListener('click', () => {
            const wordCount = currentArticle.content ? currentArticle.content.trim().split(/\s+/).length : 0;
            const readingTime = Math.ceil(wordCount / 200); // avg 200 words per min
            
            detailsContent.innerHTML = `
                <div class="grid grid-cols-3 gap-2 border-b border-gray-100 pb-3">
                    <span class="font-semibold text-gray-500 col-span-1">Title:</span>
                    <span class="col-span-2 text-gray-900">${currentArticle.title}</span>
                </div>
                <div class="grid grid-cols-3 gap-2 border-b border-gray-100 py-3">
                    <span class="font-semibold text-gray-500 col-span-1">Tags:</span>
                    <span class="col-span-2 text-gray-900">${currentArticle.tags.join(', ') || 'None'}</span>
                </div>
                <div class="grid grid-cols-3 gap-2 border-b border-gray-100 py-3">
                    <span class="font-semibold text-gray-500 col-span-1">Word Count:</span>
                    <span class="col-span-2 text-gray-900">${wordCount.toLocaleString()} words</span>
                </div>
                <div class="grid grid-cols-3 gap-2 pt-3">
                    <span class="font-semibold text-gray-500 col-span-1">Read Time:</span>
                    <span class="col-span-2 text-gray-900">~${readingTime} min</span>
                </div>
            `;
            openModal('details-modal');
        });

        // Update Request Logic
        document.getElementById('update-btn').addEventListener('click', () => {
            openModal('update-modal');
            setTimeout(() => updateContextInput.focus(), 100);
        });

        submitUpdateBtn.addEventListener('click', () => {
            const query = new URLSearchParams(window.location.search).get('article');
            const context = updateContextInput.value.trim();
            closeModal();
            if (query) performSearch(query, false, true, context);
        });

        // Share Logic
        document.getElementById('share-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href);
            kebabMenu.classList.remove('show');
            alert("Link copied to clipboard!"); // Simple fallback since we don't have a toast component built in
        });

        /**
         * Global Events
         */
        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            performSearch(searchInput.value);
        });

        window.addEventListener('popstate', () => {
            const article = new URLSearchParams(window.location.search).get('article');
            if (article) performSearch(article, false);
            else location.reload();
        });

        window.addEventListener('DOMContentLoaded', () => {
            const article = new URLSearchParams(window.location.search).get('article');
            if (article) performSearch(article, false);
        });

        function updateLoadingText(title, subtitle) {
            loadingTitle.innerText = title;
            loadingSubtitle.innerText = subtitle;
        }

        function showError(msg) {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            errorMessage.innerText = msg;
            errorBanner.classList.remove('hidden');
        }
    </script>
</body>
</html>
