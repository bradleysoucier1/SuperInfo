<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperInfo - AI Wikipedia</title>
    
    <!-- Google Fonts: Roboto for Material 3 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Serif:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Material 3 Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0061a4',
                        'on-primary': '#ffffff',
                        'primary-container': '#d1e4ff',
                        'on-primary-container': '#001d36',
                        secondary: '#535f70',
                        'on-secondary': '#ffffff',
                        'secondary-container': '#d7e3f7',
                        'on-secondary-container': '#101c2b',
                        tertiary: '#6b5778',
                        'tertiary-container': '#f2daff',
                        'on-tertiary-container': '#251431',
                        surface: '#fdfcff',
                        'on-surface': '#1a1c1e',
                        'surface-variant': '#dfe2eb',
                        'on-surface-variant': '#43474e',
                        'surface-container': '#f2f0f4',
                        'surface-container-high': '#eceaef',
                        'surface-container-highest': '#e6e4e9',
                        outline: '#73777f',
                        'outline-variant': '#c3c7cf',
                        error: '#ba1a1a',
                        'error-container': '#ffdad6',
                        'on-error-container': '#410002',
                    },
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        serif: ['Roboto Serif', 'serif'],
                    },
                    borderRadius: {
                        '4xl': '28px',
                    },
                    boxShadow: {
                        'm3-elevation-1': '0px 1px 2px 0px rgba(0, 0, 0, 0.3), 0px 1px 3px 1px rgba(0, 0, 0, 0.15)',
                        'm3-elevation-3': '0px 1px 3px 0px rgba(0, 0, 0, 0.3), 0px 4px 8px 3px rgba(0, 0, 0, 0.15)',
                    }
                }
            }
        }
    </script>
    
    <!-- Marked.js & Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* M3 Typography for Markdown */
        .markdown-body h1 { font-size: 2.25rem; font-weight: 400; padding-bottom: 0.5rem; margin-top: 2.5rem; margin-bottom: 1rem; color: theme('colors.on-surface'); letter-spacing: 0px; }
        .markdown-body h2 { font-size: 1.75rem; font-weight: 400; margin-top: 2rem; margin-bottom: 1rem; color: theme('colors.on-surface'); border-bottom: 1px solid theme('colors.surface-variant'); padding-bottom: 0.5rem; }
        .markdown-body h3 { font-size: 1.375rem; font-weight: 500; margin-top: 1.5rem; margin-bottom: 0.75rem; color: theme('colors.on-surface'); }
        .markdown-body p { margin-bottom: 1.25rem; line-height: 1.6; color: theme('colors.on-surface-variant'); font-size: 1.05rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 2rem; margin-bottom: 1.25rem; color: theme('colors.on-surface-variant'); }
        .markdown-body ol { list-style-type: decimal; padding-left: 2rem; margin-bottom: 1.25rem; color: theme('colors.on-surface-variant'); }
        .markdown-body li { margin-bottom: 0.5rem; }
        .markdown-body strong { font-weight: 500; color: theme('colors.on-surface'); }
        .markdown-body a { color: theme('colors.primary'); text-decoration: none; font-weight: 500; border-radius: 4px; padding: 0 2px; transition: background-color 0.2s; }
        .markdown-body a:hover { background-color: theme('colors.primary-container'); text-decoration: underline; }
        .markdown-body blockquote { border-left: 4px solid theme('colors.primary'); padding-left: 1rem; margin-left: 0; margin-right: 0; color: theme('colors.on-surface-variant'); background: theme('colors.surface-container'); padding: 1rem; border-radius: 0 12px 12px 0; }
        
        /* Material 3 Circular Loader */
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid theme('colors.primary-container');
            border-bottom-color: theme('colors.primary');
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Layout Transitions */
        #search-container { transition: all 0.6s cubic-bezier(0.2, 0, 0, 1); }
        .centered-search { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .top-search { min-height: auto; padding-top: 2rem; padding-bottom: 2rem; }

        /* Kebab Menu Animation */
        .menu-dropdown {
            opacity: 0;
            transform: scale(0.95);
            transform-origin: top right;
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        .menu-dropdown.show { 
            opacity: 1; 
            transform: scale(1);
            pointer-events: auto;
        }

        /* Modal Scrim */
        #modal-overlay.show { opacity: 1; pointer-events: auto; backdrop-filter: blur(2px); }
        #modal-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; background-color: rgba(0,0,0,0.4); }
        .m3-dialog { transform: scale(0.95); opacity: 0; transition: all 0.3s cubic-bezier(0.2, 0, 0, 1); }
        .m3-dialog.show { transform: scale(1); opacity: 1; }

        /* --- MATERIAL RIPPLE EFFECT --- */
        .ripple-target {
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 600ms linear;
            background-color: currentColor;
            opacity: 0.12;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-sans antialiased min-h-screen selection:bg-primary-container selection:text-on-primary-container">

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <!-- Search Section -->
        <div id="search-container" class="centered-search">
            <div class="text-center mb-10" id="logo-container">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-primary-container text-primary mb-6 shadow-sm">
                    <i data-lucide="globe" class="w-10 h-10"></i>
                </div>
                <h1 class="text-4xl md:text-5xl font-normal text-on-surface tracking-tight mb-4">SuperInfo Wiki</h1>
                <p class="text-lg text-on-surface-variant font-medium">The encyclopedic knowledge base generated by AI.</p>
            </div>
            
            <form id="search-form" class="max-w-2xl mx-auto w-full relative">
                <div class="relative flex items-center bg-surface-container-high rounded-full h-16 hover:bg-surface-container-highest focus-within:bg-surface focus-within:shadow-m3-elevation-1 transition-all duration-300">
                    <i data-lucide="search" class="absolute left-6 text-on-surface-variant w-6 h-6"></i>
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Search for any topic..." 
                        class="w-full h-full pl-16 pr-32 text-lg bg-transparent text-on-surface placeholder-on-surface-variant outline-none rounded-full"
                        required
                    >
                    <button type="submit" class="absolute right-2 bg-primary text-on-primary px-6 h-12 rounded-full font-medium tracking-wide ripple-target hover:bg-primary/90 transition-colors shadow-sm">
                        Read
                    </button>
                </div>
            </form>
        </div>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden bg-error-container text-on-error-container p-5 my-6 rounded-3xl flex items-start shadow-sm transition-all duration-300">
            <i data-lucide="alert-circle" class="h-6 w-6 mr-4 flex-shrink-0 mt-0.5"></i>
            <div>
                <h3 class="text-base font-medium">Error Encountered</h3>
                <div class="mt-1 text-sm opacity-90"><p id="error-message"></p></div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden flex-col items-center justify-center py-32">
            <div class="loader mb-8"></div>
            <h2 id="loading-title" class="text-2xl font-normal text-on-surface mb-3">Searching...</h2>
            <p id="loading-subtitle" class="text-on-surface-variant text-center max-w-md text-base leading-relaxed"></p>
        </div>

        <!-- Article Display Area -->
        <div id="article-container" class="hidden pb-24 opacity-0 transition-opacity duration-700">
            
            <div class="flex justify-between items-start mb-6">
                <!-- Badges / M3 Chips -->
                <div class="flex flex-wrap gap-2" id="badge-container"></div>
                
                <!-- Kebab Menu -->
                <div class="relative">
                    <button id="menu-button" class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface-variant ripple-target outline-none focus:bg-surface-variant">
                        <i data-lucide="more-vertical" class="w-6 h-6"></i>
                    </button>
                    <!-- M3 Dropdown Menu -->
                    <div id="kebab-menu" class="menu-dropdown absolute right-0 top-full mt-1 bg-surface-container shadow-m3-elevation-3 rounded-xl py-2 min-w-[220px] z-40 border border-outline-variant/30">
                        <button id="details-btn" class="w-full text-left px-4 py-3 hover:bg-surface-variant flex items-center text-sm font-medium text-on-surface ripple-target transition-colors">
                            <i data-lucide="info" class="w-5 h-5 mr-3 text-on-surface-variant"></i> Article Details
                        </button>
                        <button id="edit-btn" class="w-full text-left px-4 py-3 hover:bg-surface-variant flex items-center text-sm font-medium text-on-surface ripple-target transition-colors">
                            <i data-lucide="edit-3" class="w-5 h-5 mr-3 text-on-surface-variant"></i> Manual Edit
                        </button>
                        <button id="update-btn" class="w-full text-left px-4 py-3 hover:bg-surface-variant flex items-center text-sm font-medium text-on-surface ripple-target transition-colors">
                            <i data-lucide="refresh-cw" class="w-5 h-5 mr-3 text-on-surface-variant"></i> Request AI Update
                        </button>
                        <button id="share-btn" class="w-full text-left px-4 py-3 hover:bg-surface-variant flex items-center text-sm font-medium text-on-surface ripple-target transition-colors">
                            <i data-lucide="share-2" class="w-5 h-5 mr-3 text-on-surface-variant"></i> Copy Link
                        </button>
                    </div>
                </div>
            </div>
            
            <h1 id="article-title" class="text-4xl md:text-[3.5rem] leading-tight font-normal text-on-surface mb-10"></h1>
            
            <div id="article-content" class="markdown-body"></div>
            
            <div class="mt-16 pt-8 border-t border-outline-variant text-sm text-on-surface-variant flex justify-between items-center">
                <p id="footer-text" class="font-medium">SuperInfo Knowledge Base</p>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="text-primary hover:bg-primary-container px-4 py-2 rounded-full font-medium transition-colors flex items-center ripple-target">
                    Back to top <i data-lucide="arrow-up" class="w-4 h-4 ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modals Overlay (M3 Scrim) -->
    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        
        <!-- Details Modal (M3 Dialog) -->
        <div id="details-modal" class="hidden m3-dialog bg-surface-container-high rounded-4xl max-w-md w-full p-6 shadow-m3-elevation-3">
            <h3 class="text-2xl font-normal mb-5 flex items-center text-on-surface">
                <i data-lucide="info" class="w-6 h-6 mr-3 text-primary"></i> Article Details
            </h3>
            <div id="details-content" class="space-y-4 text-[15px] text-on-surface-variant">
                <!-- Content injected via JS -->
            </div>
            <div class="mt-8 flex justify-end">
                <button class="close-modal text-primary px-5 py-2.5 rounded-full font-medium hover:bg-primary/10 transition-colors ripple-target">Close</button>
            </div>
        </div>

        <!-- AI Update Request Modal (M3 Dialog) -->
        <div id="update-modal" class="hidden m3-dialog bg-surface-container-high rounded-4xl max-w-md w-full p-6 shadow-m3-elevation-3">
            <h3 class="text-2xl font-normal mb-3 flex items-center text-on-surface">
                <i data-lucide="refresh-cw" class="w-6 h-6 mr-3 text-primary"></i> AI Update
            </h3>
            <p class="text-[15px] text-on-surface-variant mb-6 leading-relaxed">What should the AI change? Describe missing info or corrections.</p>
            
            <div class="relative w-full mb-2">
                <textarea 
                    id="update-context" 
                    rows="4" 
                    class="peer w-full bg-surface border border-outline rounded text-on-surface p-4 pt-5 outline-none focus:border-primary focus:border-2 transition-all resize-none"
                    placeholder=" "
                ></textarea>
                <label class="absolute text-on-surface-variant duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-surface px-2 peer-focus:px-2 peer-focus:text-primary peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-6 peer-focus:top-2 peer-focus:scale-75 left-2">
                    Instructions for AI
                </label>
            </div>

            <div class="mt-8 flex justify-end space-x-2">
                <button class="close-modal text-primary px-5 py-2.5 rounded-full font-medium hover:bg-primary/10 transition-colors ripple-target">Cancel</button>
                <button id="submit-update-btn" class="bg-primary text-on-primary px-6 py-2.5 rounded-full font-medium hover:bg-primary/90 transition-colors shadow-sm ripple-target">Regenerate</button>
            </div>
        </div>

        <!-- Manual Edit Modal (M3 Dialog - Wide) -->
        <div id="edit-modal" class="hidden m3-dialog bg-surface-container-high rounded-4xl max-w-2xl w-full p-6 shadow-m3-elevation-3">
            <h3 class="text-2xl font-normal mb-3 flex items-center text-on-surface">
                <i data-lucide="edit-3" class="w-6 h-6 mr-3 text-primary"></i> Manual Edit
            </h3>
            <p class="text-[15px] text-on-surface-variant mb-4">Editing Markdown source for <strong><span id="edit-article-title"></span></strong>.</p>
            
            <div class="relative w-full mb-2">
                <textarea 
                    id="manual-edit-content" 
                    rows="15" 
                    class="w-full bg-surface border border-outline rounded text-on-surface p-4 font-mono text-sm outline-none focus:border-primary focus:border-2 transition-all resize-none overflow-y-auto"
                ></textarea>
            </div>

            <div class="mt-6 flex justify-end space-x-2">
                <button class="close-modal text-primary px-5 py-2.5 rounded-full font-medium hover:bg-primary/10 transition-colors ripple-target">Discard</button>
                <button id="save-edit-btn" class="bg-primary text-on-primary px-6 py-2.5 rounded-full font-medium hover:bg-primary/90 transition-colors shadow-sm ripple-target">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getVertexAI, getGenerativeModel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-vertexai.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7vXm-KjKfnfMi-JgttejMV_uXoZZTWnQ",
            authDomain: "superinfo-f31f5.firebaseapp.com",
            projectId: "superinfo-f31f5",
            storageBucket: "superinfo-f31f5.firebasestorage.app",
            messagingSenderId: "829592714928",
            appId: "1:829592714928:web:3c1c6dc020be3568eac575",
            measurementId: "G-3842263MML"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const vertexAI = getVertexAI(app);
        const model = getGenerativeModel(vertexAI, { 
            model: "gemini-2.5-pro",
            generationConfig: { responseMimeType: "application/json" } 
        }); 
        
        lucide.createIcons();

        // UI State
        let currentArticle = { title: '', slug: '', content: '', tags: [] };

        // DOM Elements
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const searchContainer = document.getElementById('search-container');
        const loadingState = document.getElementById('loading-state');
        const loadingTitle = document.getElementById('loading-title');
        const loadingSubtitle = document.getElementById('loading-subtitle');
        const articleContainer = document.getElementById('article-container');
        const articleTitle = document.getElementById('article-title');
        const articleContent = document.getElementById('article-content');
        const badgeContainer = document.getElementById('badge-container');
        const logoContainer = document.getElementById('logo-container');
        const errorBanner = document.getElementById('error-banner');
        const errorMessage = document.getElementById('error-message');
        const kebabMenu = document.getElementById('kebab-menu');
        const menuBtn = document.getElementById('menu-button');
        
        const modalOverlay = document.getElementById('modal-overlay');
        const detailsModal = document.getElementById('details-modal');
        const updateModal = document.getElementById('update-modal');
        const editModal = document.getElementById('edit-modal');
        const detailsContent = document.getElementById('details-content');
        const updateContextInput = document.getElementById('update-context');
        const manualEditArea = document.getElementById('manual-edit-content');
        const editArticleTitleLabel = document.getElementById('edit-article-title');

        /**
         * Search and Navigation
         */
        async function performSearch(query, updateHistory = true, forceUpdate = false, updateContext = "") {
            if (!query) return;
            const cleanQuery = query.trim();
            const slug = cleanQuery.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

            if (updateHistory) {
                const newUrl = window.location.pathname + '?article=' + encodeURIComponent(cleanQuery);
                window.history.pushState({ query: cleanQuery }, '', newUrl);
            }
            document.title = `${cleanQuery} - SuperInfo Wiki`;
            searchInput.value = cleanQuery;

            hideUI();
            
            try {
                if (!forceUpdate) {
                    updateLoadingText("Searching Archive", "Checking knowledge base for existing records.");
                    const docSnap = await getDoc(doc(db, "articles", slug));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        renderArticle(data.title, data.content, "cache", data.tags || []);
                        return;
                    }
                }
                await generateOrUpdateArticle(cleanQuery, slug, forceUpdate, updateContext);
            } catch (error) {
                showError(`Error: ${error.message}`);
            }
        }

        async function generateOrUpdateArticle(query, slug, isUpdate = false, updateContext = "") {
            const task = isUpdate ? "Rebuilding Article" : "Synthesizing Knowledge";
            let subtitle = `Compiling verified data for "${query}". Cross-referencing sources and formatting documentation.`;
            if (isUpdate && updateContext) {
                subtitle = `Applying specific improvements based on your instructions...`;
            }
            updateLoadingText(task, subtitle);
            
            let prompt = `You are a professional encyclopedia generator. Generate a JSON response for the topic: "${query}".
            JSON structure: { "title": "string", "content": "markdown string", "tags": ["tag1", "tag2"] }.
            Tags should include topic category and status like "Stable" or "Rapidly Evolving".
            Always include "AI Generated" or "Verified Summary" in tags.`;

            if (isUpdate && updateContext) {
                prompt += `\n\nUSER REQUEST: "${updateContext}". Integrate this specific information precisely.`;
            }

            try {
                const result = await model.generateContent(prompt);
                const data = JSON.parse(result.response.text());
                
                await setDoc(doc(db, "articles", slug), {
                    ...data,
                    updatedAt: serverTimestamp(),
                    createdAt: isUpdate ? (await getDoc(doc(db, "articles", slug))).data()?.createdAt : serverTimestamp()
                });

                renderArticle(data.title, data.content, isUpdate ? "update" : "ai", data.tags);
            } catch (err) {
                throw new Error("AI Generation failed: " + err.message);
            }
        }

        function renderArticle(title, markdown, source, tags = []) {
            const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
            currentArticle = { title, content: markdown, tags, slug };
            
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            
            articleTitle.innerText = title;
            articleContent.innerHTML = marked.parse(markdown);
            badgeContainer.innerHTML = '';
            
            const sourceInfo = {
                cache: { color: 'bg-secondary-container text-on-secondary-container', icon: 'database', text: 'Verified Record' },
                ai: { color: 'bg-tertiary-container text-on-tertiary-container', icon: 'sparkles', text: 'AI Generated' },
                update: { color: 'bg-primary-container text-on-primary-container', icon: 'refresh-cw', text: 'Recently Updated' }
            }[source];

            addBadge(sourceInfo.text, sourceInfo.color, sourceInfo.icon);
            tags.forEach(tag => addBadge(tag, 'border border-outline text-on-surface-variant', 'tag'));
            
            lucide.createIcons();
            interceptLinks();

            articleContainer.classList.remove('hidden');
            setTimeout(() => articleContainer.classList.add('opacity-100'), 50);
        }

        function addBadge(text, color, icon) {
            const span = document.createElement('span');
            span.className = `inline-flex items-center px-3 py-1.5 rounded-lg text-sm font-medium ${color}`;
            span.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 mr-2 opacity-80"></i> ${text}`;
            badgeContainer.appendChild(span);
        }

        function interceptLinks() {
            articleContent.querySelectorAll('a').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.startsWith('?article=')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        performSearch(decodeURIComponent(href.split('=')[1]));
                    });
                }
            });
        }

        function hideUI() {
            errorBanner.classList.add('hidden');
            searchContainer.classList.remove('centered-search');
            searchContainer.classList.add('top-search');
            logoContainer.classList.add('hidden');
            articleContainer.classList.add('hidden');
            articleContainer.classList.remove('opacity-100');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            kebabMenu.classList.remove('show');
            closeModal();
        }

        /**
         * Modals & Kebab Menu Events
         */
        function openModal(modalId) {
            modalOverlay.classList.remove('hidden');
            setTimeout(() => {
                modalOverlay.classList.add('show');
                detailsModal.classList.add('hidden');
                updateModal.classList.add('hidden');
                editModal.classList.add('hidden');
                
                const targetModal = document.getElementById(modalId);
                targetModal.classList.remove('hidden');
                setTimeout(() => targetModal.classList.add('show'), 10);
            }, 10);
            kebabMenu.classList.remove('show');
        }

        function closeModal() {
            modalOverlay.classList.remove('show');
            document.querySelectorAll('.m3-dialog').forEach(m => m.classList.remove('show'));
            setTimeout(() => modalOverlay.classList.add('hidden'), 300);
        }

        document.querySelectorAll('.close-modal').forEach(btn => btn.addEventListener('click', closeModal));
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            kebabMenu.classList.toggle('show');
        });
        document.addEventListener('click', () => kebabMenu.classList.remove('show'));

        // Details Logic
        document.getElementById('details-btn').addEventListener('click', () => {
            const wordCount = currentArticle.content ? currentArticle.content.trim().split(/\s+/).length : 0;
            detailsContent.innerHTML = `
                <div class="space-y-3">
                    <div class="flex flex-col"><span class="text-xs uppercase font-bold tracking-wider opacity-60">Title</span><span>${currentArticle.title}</span></div>
                    <div class="flex flex-col"><span class="text-xs uppercase font-bold tracking-wider opacity-60">Words</span><span>${wordCount.toLocaleString()}</span></div>
                    <div class="flex flex-col"><span class="text-xs uppercase font-bold tracking-wider opacity-60">Tags</span><span class="flex flex-wrap gap-1 mt-1">${currentArticle.tags.map(t => `<span class='px-2 py-0.5 bg-surface-variant rounded text-xs'>${t}</span>`).join('')}</span></div>
                </div>`;
            openModal('details-modal');
        });

        // Manual Edit Logic
        document.getElementById('edit-btn').addEventListener('click', () => {
            editArticleTitleLabel.innerText = currentArticle.title;
            manualEditArea.value = currentArticle.content;
            openModal('edit-modal');
            setTimeout(() => manualEditArea.focus(), 350);
        });

        document.getElementById('save-edit-btn').addEventListener('click', async () => {
            const newContent = manualEditArea.value;
            const slug = currentArticle.slug;
            
            // Optimistic UI
            closeModal();
            updateLoadingText("Saving Changes", "Writing your edits to the knowledge base record.");
            loadingState.classList.remove('hidden');
            articleContainer.classList.add('hidden');

            try {
                await setDoc(doc(db, "articles", slug), {
                    ...currentArticle,
                    content: newContent,
                    updatedAt: serverTimestamp()
                }, { merge: true });
                
                renderArticle(currentArticle.title, newContent, "cache", currentArticle.tags);
            } catch (err) {
                showError("Save failed: " + err.message);
            }
        });

        // AI Update Logic
        document.getElementById('update-btn').addEventListener('click', () => openModal('update-modal'));
        document.getElementById('submit-update-btn').addEventListener('click', () => {
            const query = currentArticle.title;
            const context = updateContextInput.value.trim();
            closeModal();
            if (query) performSearch(query, false, true, context);
        });

        // Share Logic
        document.getElementById('share-btn').addEventListener('click', () => {
            document.execCommand('copy'); // Fallback for iFrame
            navigator.clipboard.writeText(window.location.href);
            kebabMenu.classList.remove('show');
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-on-surface text-surface px-6 py-3 rounded-full text-sm font-medium z-[100] shadow-m3-elevation-3';
            toast.innerText = 'Link copied to clipboard';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        });

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            performSearch(searchInput.value);
        });

        window.addEventListener('popstate', () => {
            const article = new URLSearchParams(window.location.search).get('article');
            if (article) performSearch(article, false);
            else location.reload();
        });

        window.addEventListener('DOMContentLoaded', () => {
            const article = new URLSearchParams(window.location.search).get('article');
            if (article) performSearch(article, false);
        });

        function updateLoadingText(title, subtitle) {
            loadingTitle.innerText = title;
            loadingSubtitle.innerText = subtitle;
        }

        function showError(msg) {
            loadingState.classList.add('hidden');
            errorMessage.innerText = msg;
            errorBanner.classList.remove('hidden');
        }

        // Material 3 Ripple Logic
        document.addEventListener('mousedown', function(e) {
            let target = e.target.closest('.ripple-target');
            if (!target) return;
            const rect = target.getBoundingClientRect();
            const circle = document.createElement('span');
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            circle.classList.add('ripple');
            circle.style.left = `${x}px`;
            circle.style.top = `${y}px`;
            const radius = Math.max(rect.width, rect.height);
            circle.style.width = circle.style.height = `${radius}px`;
            circle.style.marginLeft = circle.style.marginTop = `${-radius/2}px`;
            target.appendChild(circle);
            setTimeout(() => circle.remove(), 600);
        });
    </script>
</body>
</html>
